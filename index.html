<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حجز دور عند الحلاق</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 500px;
            background: #ffffff;
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }
        h2, h3 { color: #333; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; }
        input, select, button {
            width: 100%;
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 15px;
        }
        button {
            background-color: #2c3e50;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        button:hover { background-color: #1a252f; }
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
        .success { color: #27ae60; }
        .error { color: #e74c3c; }
        .booking-list { margin-top: 25px; border-top: 2px solid #eee; padding-top: 15px; }
        .booking-item {
            background: #f8f9fa;
            border-right: 4px solid #2c3e50;
            padding: 10px;
            margin-bottom: 8px;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>✂️ حجز موعد عند الحلاق</h2>
    
    <form id="bookingForm">
        <div class="form-group">
            <label>اسم الزبون:</label>
            <input type="text" id="clientName" required placeholder="أدخل اسمك الكريم">
        </div>
        <div class="form-group">
            <label>رقم الهاتف:</label>
            <input type="tel" id="phone" required placeholder="0500000000">
        </div>
        <div class="form-group">
            <label>الخدمة المطلوبة:</label>
            <select id="service">
                <option value="حلاقة شعر">حلاقة شعر</option>
                <option value="حلاقة ذقن">حلاقة ذقن</option>
                <option value="شعر + ذقن">شعر + ذقن</option>
                <option value="تنظيف بشرة + حلاقة">تنظيف بشرة + حلاقة</option>
            </select>
        </div>
        <div class="form-group">
            <label>التاريخ:</label>
            <input type="date" id="date" required>
        </div>
        <div class="form-group">
            <label>الوقت:</label>
            <input type="time" id="time" required>
        </div>
        <button type="submit">تأكيد الحجز</button>
    </form>

    <div id="message"></div>

    <div class="booking-list">
        <h3>المواعيد المحجوزة</h3>
        <div id="bookingsContainer">لا توجد حجوزات حالياً</div>
    </div>
</div>

<script>
    const form = document.getElementById('bookingForm');
    const messageDiv = document.getElementById('message');
    const bookingsContainer = document.getElementById('bookingsContainer');

    // جلب الحجوزات عند تحميل الصفحة
    loadBookings();

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const data = {
            clientName: document.getElementById('clientName').value,
            phone: document.getElementById('phone').value,
            service: document.getElementById('service').value,
            date: document.getElementById('date').value,
            time: document.getElementById('time').value
        };

        try {
            const res = await fetch('/api/bookings', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            const result = await res.json();

            if (res.ok) {
                messageDiv.className = 'success';
                messageDiv.textContent = result.message;
                form.reset();
                loadBookings();
            } else {
                messageDiv.className = 'error';
                messageDiv.textContent = result.message;
            }
        } catch (err) {
            messageDiv.className = 'error';
            messageDiv.textContent = 'حدث خطأ في الاتصال بالسيرفر';
        }
    });

    async function loadBookings() {
        try {
            const res = await fetch('/api/bookings');
            const bookings = await res.json();

            if (bookings.length === 0) {
                bookingsContainer.innerHTML = 'لا توجد حجوزات حالياً';
                return;
            }

            bookingsContainer.innerHTML = bookings.map(b => `
                <div class="booking-item">
                    <strong>${b.clientName}</strong> - ${b.service}<br>
                    📅 ${b.date} | ⏰ ${b.time}
                </div>
            `).join('');
        } catch (err) {
            console.error(err);
        }
    }
</script>

</body>
</html>
